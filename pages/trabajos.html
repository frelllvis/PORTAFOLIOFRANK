<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trabajos · Portafolio</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">
      <span class="icon">◈</span>
      <span id="nav-name">Portafolio</span>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="perfil.html">Mi Perfil</a></li>
      <li><a href="curso.html">Curso & Docente</a></li>
      <li><a href="trabajos.html" class="active">Trabajos</a></li>
      <li class="admin-only"><a href="subir.html" class="btn-upload">+ Subir Trabajo</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </nav>

  <div class="breadcrumb"><a href="../index.html">Inicio</a> / Trabajos</div>

  <div class="page-header">
    <h1>Mis Trabajos</h1>
    <p>Todos mis trabajos académicos: reportes, código, análisis y más.</p>
  </div>

  <div class="section" style="padding-top:0;">

    <!-- Barra de búsqueda + filtros -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍  Buscar por título o descripción…" oninput="filterWorks()"/>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-type="all" onclick="setFilter(this,'all')">Todos</button>
      <button class="filter-btn" data-type="pdf"   onclick="setFilter(this,'pdf')">📄 PDF</button>
      <button class="filter-btn" data-type="r"     onclick="setFilter(this,'r')">📊 R / RStudio</button>
      <button class="filter-btn" data-type="excel" onclick="setFilter(this,'excel')">📗 Excel / CSV</button>
      <button class="filter-btn" data-type="word"  onclick="setFilter(this,'word')">📝 Word</button>
      <button class="filter-btn" data-type="otro"  onclick="setFilter(this,'otro')">📁 Otro</button>
    </div>

    <div id="count" style="color:var(--muted);font-size:.85rem;margin-bottom:1rem;"></div>
    <div class="cards-grid" id="works-grid"></div>

    <!-- Botón flotante admin -->
    <div class="admin-only" style="justify-content:center;margin-top:2.5rem;">
      <a href="subir.html" class="btn-primary">+ Subir nuevo trabajo</a>
    </div>

  </div>

  <footer class="footer">
    <span class="footer-symbol">◈</span>
    <span>Portafolio Académico</span>
  </footer>

  <script src="../js/app.js"></script>
  <script>
    const perfil = getPerfil();
    if (perfil.nombre) document.getElementById('nav-name').textContent = perfil.nombre.split(' ')[0];

    let activeFilter = 'all';
    let allWorks = getWorks();

    function setFilter(btn, type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = type;
      filterWorks();
    }

    function filterWorks() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = allWorks.filter(t => {
        const matchType = activeFilter === 'all' || (t.type || getFileType(t.fileName)) === activeFilter;
        const matchQ    = !q || t.title.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q);
        return matchType && matchQ;
      });
      renderGrid(filtered);
    }

    function renderGrid(list) {
      const grid = document.getElementById('works-grid');
      const count = document.getElementById('count');
      const admin = isAdmin();
      if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state">
          <span>📂</span>
          <p>No hay trabajos que coincidan.
          ${admin ? '<br><a href="subir.html">Subir primer trabajo</a>' : ''}
          </p></div>`;
        count.textContent = '';
      } else {
        grid.innerHTML = list.slice().reverse().map(t => buildCard(t, admin)).join('');
        count.textContent = list.length + ' trabajo' + (list.length !== 1 ? 's' : '');
      }
    }

    window.afterDelete = () => {
      allWorks = getWorks();
      filterWorks();
    };

    filterWorks();
  </script>
</body>
</html>
